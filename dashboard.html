<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>펌웨어 배포 검증 공수 대시보드</title>
<!-- 조회 전용 대시보드 — Confluence 임베드용. 입력/수정 기능 없음.
     데이터는 index.html(공수 입력 앱)과 같은 Apps Script 저장소에서 읽는다. -->
<script src="chart.js"></script>
<style>
  :root{
    --bg:#F5F5F7; --panel:#FFFFFF; --panel-alt:#F5F5F7;
    --ink:#1D1D1F; --ink-soft:#6E6E73; --ink-faint:#86868B; --line:#E5E5EA;
    --accent:#0071E3; --accent-dark:#0058B0; --accent-soft:#E8F2FE;
    --warn:#FF9F0A; --danger:#FF3B30; --good:#34C759;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Malgun Gothic", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.45;letter-spacing:-0.006em;-webkit-font-smoothing:antialiased;}
  #app{max-width:1280px;margin:0 auto;padding:14px 16px 30px;}

  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
  .head h1{font-size:16px;margin:0;font-weight:700;letter-spacing:-0.01em;}
  .head .sub{font-size:11px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px rgba(52,199,89,0.18);}
  .dot.syncing{animation:pulse 1.1s infinite;}
  @keyframes pulse{0%{opacity:1;}50%{opacity:0.35;}100%{opacity:1;}}

  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .filters .field{flex:1;min-width:110px;}
  label{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:600;margin-bottom:3px;}
  select{width:100%;padding:6px 9px;border:1px solid transparent;border-radius:8px;background:#fff;color:var(--ink);font-size:12px;font-family:var(--sans);box-shadow:0 1px 2px rgba(0,0,0,0.05);}
  select:focus{outline:none;border-color:var(--accent);}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
  .stat-card{background:var(--panel);border-radius:12px;padding:10px 14px;box-shadow:0 1px 2px rgba(0,0,0,0.04);}
  .stat-label{font-size:10.5px;color:var(--ink-soft);font-weight:600;margin-bottom:3px;}
  .stat-value{font-variant-numeric:tabular-nums;font-size:20px;font-weight:700;letter-spacing:-0.02em;}
  .stat-value span{font-size:11px;color:var(--ink-faint);font-weight:600;margin-left:2px;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .card{background:var(--panel);border-radius:12px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,0.04);}
  .card h2{font-size:12.5px;margin:0 0 8px;font-weight:700;}
  .card.wide{grid-column:1 / -1;}
  .chart-wrap{position:relative;height:210px;}
  canvas{max-width:100%;}
  .warn-note{display:none;color:var(--danger);font-size:11.5px;margin-bottom:10px;}
  @media (max-width:700px){ .grid{grid-template-columns:1fr;} .stats{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div id="app">
  <div class="head">
    <h1>펌웨어 배포 검증 공수 대시보드</h1>
    <div class="sub"><span class="dot" id="syncDot"></span><span id="syncLabel">불러오는 중…</span></div>
  </div>

  <div class="filters">
    <div class="field"><label>담당자</label><select id="fMember"><option value="all">전체</option></select></div>
    <div class="field"><label>월</label><select id="fMonth"><option value="all">전체</option></select></div>
    <div class="field"><label>차수</label><select id="fRound"><option value="all">전체</option></select></div>
    <div class="field"><label>차종</label><select id="fVehicle"><option value="all">전체</option></select></div>
    <div class="field"><label>구분</label><select id="fGroup">
      <option value="all">전체</option>
      <option value="verify">검증 수행</option>
      <option value="env">환경 설정</option>
      <option value="pm">PM 업무</option>
    </select></div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">총 공수</div><div class="stat-value" id="statTotal">0<span>시간</span></div></div>
    <div class="stat-card"><div class="stat-label">총 기록 건수</div><div class="stat-value" id="statCount">0<span>건</span></div></div>
    <div class="stat-card"><div class="stat-label">건당 평균</div><div class="stat-value" id="statAvg">0<span>분</span></div></div>
  </div>

  <p class="warn-note" id="chartLibWarning">※ 차트 라이브러리를 불러오지 못했습니다. 숫자 집계는 정상입니다.</p>

  <div class="grid">
    <div class="card"><h2>인당 총공수 (시간)</h2><div class="chart-wrap"><canvas id="chartByMember"></canvas></div></div>
    <div class="card"><h2>차종별 총공수</h2><div class="chart-wrap"><canvas id="chartByVehicle"></canvas></div></div>
    <div class="card"><h2>중분류(A-1~A-6)별 평균 (분)</h2><div class="chart-wrap"><canvas id="chartByMidVerify"></canvas></div></div>
    <div class="card"><h2>정상 진행 vs 이슈 대응 (시간)</h2><div class="chart-wrap"><canvas id="chartNormalVsIssue"></canvas></div></div>
    <div class="card wide"><h2>월별 추이 — 차종별 (시간)</h2><div class="chart-wrap"><canvas id="chartMonthly"></canvas></div></div>
    <div class="card wide"><h2>소분류별 평균 소요시간 (분)</h2><div class="chart-wrap" id="subWrap" style="height:300px;"><canvas id="chartBySub"></canvas></div></div>
  </div>
</div>

<script>
(function(){
  var API_URL = 'https://script.google.com/macros/s/AKfycbwiOgkGyZMNVIZ1LEVPxe6zfPf3QAOHSrLmK8uUYVjAAB4-UABfm5mnqQLkuydlTer8/exec';
  var VERIFY_MIDS = ['A-1','A-2','A-3','A-4','A-5','A-6'];
  var NORMAL_STAGES = ['검증 수행'];
  var ISSUE_STAGES = ['Fail 분석','이슈리포트 작성'];

  var LOGS = [];
  var MEMBERS = [];
  var VEHICLES = [];
  var charts = {};

  async function sGet(key, fallback){
    try{
      var res = await fetch(API_URL + '?action=get&key=' + encodeURIComponent(key));
      var data = await res.json();
      if(!data || data.value === null || typeof data.value === 'undefined') return fallback;
      return JSON.parse(data.value);
    }catch(e){
      console.error('storage get failed', key, e);
      return fallback;
    }
  }
  function setSyncing(on){
    document.getElementById('syncDot').classList.toggle('syncing', on);
    document.getElementById('syncLabel').textContent = on ? '동기화 중…' : '동기화됨';
  }
  function uniqueSorted(arr){
    var s = {}; arr.forEach(function(a){ if(a) s[a]=true; });
    return Object.keys(s).sort();
  }
  function fmtHours(min){ return (Math.round(min/6)/10).toString(); }

  function fillFilter(id, options){
    var sel = document.getElementById(id);
    var prev = sel.value;
    sel.innerHTML = '';
    ['all'].concat(options).forEach(function(o){
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = (o==='all'?'전체':o);
      sel.appendChild(opt);
    });
    sel.value = (prev && Array.prototype.some.call(sel.options, function(op){return op.value===prev;})) ? prev : 'all';
  }

  function refreshFilters(){
    fillFilter('fMember', MEMBERS.length ? MEMBERS : uniqueSorted(LOGS.map(function(l){return l.member;})));
    fillFilter('fMonth', uniqueSorted(LOGS.map(function(l){return l.month;})));
    fillFilter('fRound', uniqueSorted(LOGS.map(function(l){return (l.round||1)+'차';})));
    fillFilter('fVehicle', VEHICLES.length ? VEHICLES : uniqueSorted(LOGS.map(function(l){return l.vehicle;})));
    // fGroup은 고정 옵션이라 재구성하지 않음
  }

  function filteredLogs(){
    var member = document.getElementById('fMember').value;
    var month = document.getElementById('fMonth').value;
    var round = document.getElementById('fRound').value;
    var vehicle = document.getElementById('fVehicle').value;
    var group = document.getElementById('fGroup').value;
    return LOGS.filter(function(l){
      if(member!=='all' && l.member!==member) return false;
      if(month!=='all' && l.month!==month) return false;
      if(round!=='all' && ((l.round||1)+'차')!==round) return false;
      if(vehicle!=='all' && l.vehicle!==vehicle) return false;
      if(group!=='all' && l.group!==group) return false;
      return true;
    });
  }

  function destroyChart(key){
    if(charts[key]){ charts[key].destroy(); delete charts[key]; }
  }
  function baseChartOptions(extra){
    var opt = {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ font:{ family:'inherit', size:10.5 }, color:'#6E6E73' } } },
      scales:{
        x:{ ticks:{ color:'#6E6E73', font:{size:10} }, grid:{ display:false } },
        y:{ ticks:{ color:'#6E6E73', font:{size:10} }, grid:{ color:'#EDEDF0' } }
      }
    };
    return Object.assign(opt, extra||{});
  }

  function render(){
    var rows = filteredLogs();

    var totalMin = rows.reduce(function(s,l){return s+l.minutes;},0);
    document.getElementById('statTotal').innerHTML = fmtHours(totalMin)+'<span>시간</span>';
    document.getElementById('statCount').innerHTML = rows.length+'<span>건</span>';
    document.getElementById('statAvg').innerHTML = (rows.length? Math.round(totalMin/rows.length):0)+'<span>분</span>';

    if(typeof Chart === 'undefined'){
      document.getElementById('chartLibWarning').style.display='block';
      return;
    }

    var members = MEMBERS.length ? MEMBERS : uniqueSorted(LOGS.map(function(l){return l.member;}));
    var vehicles = VEHICLES.length ? VEHICLES : uniqueSorted(LOGS.map(function(l){return l.vehicle;}));

    // 인당 총공수
    var byMember = {};
    members.forEach(function(m){ byMember[m]=0; });
    rows.forEach(function(l){ byMember[l.member]=(byMember[l.member]||0)+l.minutes; });
    destroyChart('member');
    charts.member = new Chart(document.getElementById('chartByMember'), {
      type:'bar',
      data:{ labels:Object.keys(byMember), datasets:[{ label:'시간', data:Object.values(byMember).map(function(m){return Math.round(m/6)/10;}), backgroundColor:'#0071E3', borderRadius:8 }] },
      options: baseChartOptions({ plugins:{ legend:{display:false} } })
    });

    // 차종별 총공수 (차수 누적)
    var rounds = uniqueSorted(rows.map(function(l){return (l.round||1)+'차';}));
    var palette = ['#0071E3','#FF9F0A','#AF52DE','#FF3B30','#34C759'];
    var vehicleDatasets = rounds.map(function(r, i){
      return {
        label: r,
        data: vehicles.map(function(v){
          return Math.round(rows.filter(function(l){return l.vehicle===v && ((l.round||1)+'차')===r;})
            .reduce(function(s,l){return s+l.minutes;},0)/6)/10;
        }),
        backgroundColor: palette[i%palette.length],
        borderRadius: 6
      };
    });
    destroyChart('vehicle');
    charts.vehicle = new Chart(document.getElementById('chartByVehicle'), {
      type:'bar',
      data:{ labels:vehicles, datasets:vehicleDatasets },
      options: baseChartOptions({
        plugins:{ legend:{ position:'bottom', labels:{ font:{size:10.5}, color:'#6E6E73' } } },
        scales:{ x:{ stacked:true, ticks:{color:'#6E6E73',font:{size:10}}, grid:{display:false} },
                 y:{ stacked:true, ticks:{color:'#6E6E73',font:{size:10}}, grid:{color:'#EDEDF0'} } }
      })
    });

    // 중분류(A-1~A-6)별 평균 (verify only)
    var midMap = {};
    VERIFY_MIDS.forEach(function(mv){ midMap[mv]={sum:0,count:0}; });
    rows.filter(function(l){return l.group==='verify';}).forEach(function(l){
      if(!midMap[l.mid]) return;
      midMap[l.mid].sum += l.minutes; midMap[l.mid].count += 1;
    });
    destroyChart('midVerify');
    charts.midVerify = new Chart(document.getElementById('chartByMidVerify'), {
      type:'bar',
      data:{ labels:VERIFY_MIDS, datasets:[{ label:'평균 분', data:VERIFY_MIDS.map(function(mv){ var x=midMap[mv]; return x.count? Math.round(x.sum/x.count):0; }), backgroundColor:'#0071E3', borderRadius:8 }] },
      options: baseChartOptions({ plugins:{legend:{display:false}} })
    });

    // 정상 vs 이슈대응
    var normalSum=0, issueSum=0;
    rows.filter(function(l){return l.group==='verify';}).forEach(function(l){
      if(NORMAL_STAGES.indexOf(l.stage)>-1) normalSum += l.minutes;
      else if(ISSUE_STAGES.indexOf(l.stage)>-1) issueSum += l.minutes;
    });
    destroyChart('normalIssue');
    charts.normalIssue = new Chart(document.getElementById('chartNormalVsIssue'), {
      type:'bar',
      data:{ labels:['정상 진행 (검증 수행)','이슈 대응 (Fail분석·이슈리포트)'],
        datasets:[{ data:[Math.round(normalSum/6)/10, Math.round(issueSum/6)/10], backgroundColor:['#0071E3','#FF9F0A'], borderRadius:8 }] },
      options: baseChartOptions({ plugins:{legend:{display:false}} })
    });

    // 월별 추이 (차종별)
    var months = uniqueSorted(rows.map(function(l){return l.month;}));
    var monthlyByVehicle = {};
    vehicles.forEach(function(v){ monthlyByVehicle[v] = months.map(function(){return 0;}); });
    rows.forEach(function(l){
      var idx = months.indexOf(l.month);
      if(idx>-1 && monthlyByVehicle[l.vehicle]) monthlyByVehicle[l.vehicle][idx] += l.minutes;
    });
    destroyChart('monthly');
    charts.monthly = new Chart(document.getElementById('chartMonthly'), {
      type:'line',
      data:{ labels:months, datasets: vehicles.map(function(v,i){
        return { label:v, data:monthlyByVehicle[v].map(function(m){return Math.round(m/6)/10;}), borderColor:palette[i%palette.length], backgroundColor:palette[i%palette.length], tension:0.25, fill:false };
      })},
      options: baseChartOptions({})
    });

    // 소분류별 평균
    var subMap = {};
    rows.forEach(function(l){
      var key = l.mid+' · '+l.sub;
      if(!subMap[key]) subMap[key]={sum:0,count:0};
      subMap[key].sum += l.minutes; subMap[key].count += 1;
    });
    var subLabels = Object.keys(subMap);
    var subAvgs = subLabels.map(function(k){ return Math.round(subMap[k].sum/subMap[k].count); });
    document.getElementById('subWrap').style.height = Math.max(220, subLabels.length*18+40) + 'px';
    destroyChart('sub');
    charts.sub = new Chart(document.getElementById('chartBySub'), {
      type:'bar',
      data:{ labels:subLabels, datasets:[{ label:'평균 분', data:subAvgs, backgroundColor:'#AF52DE', borderRadius:8 }] },
      options: baseChartOptions({ indexAxis:'y', plugins:{legend:{display:false}} })
    });
  }

  async function load(){
    setSyncing(true);
    var [m, v, l] = await Promise.all([
      sGet('meta-members', []),
      sGet('meta-vehicles', []),
      sGet('work-logs', [])
    ]);
    MEMBERS = m || [];
    VEHICLES = v || [];
    LOGS = l || [];
    setSyncing(false);
    refreshFilters();
    render();
  }

  document.addEventListener('DOMContentLoaded', function(){
    ['fMember','fMonth','fRound','fVehicle','fGroup'].forEach(function(id){
      document.getElementById(id).addEventListener('change', render);
    });
    load();
    setInterval(load, 60000); // 60초마다 자동 갱신 (조회 전용이라 부담 없음)
  });
})();
</script>
</body>
</html>
