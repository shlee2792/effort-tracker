<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>펌웨어 배포 검증 공수 대시보드</title>
<!-- 조회 전용 대시보드 — Confluence 임베드용. 입력/수정 기능 없음.
     데이터는 index.html(공수 입력 앱)과 같은 Apps Script 저장소에서 읽는다.

     디자인: design/DESIGN-notion.md의 토큰을 그대로 이식 (따뜻한 오프화이트 캔버스,
     흰 카드+헤어라인(그림자 없음), 파랑 단일 구조색 + 장식용 스티커 팔레트, 폼은
     4px 각진 라운드 — 알약형 금지, 카드는 12px 라운드).
     Inter 폰트는 사내망 CDN 차단 이력이 있어 외부 로드하지 않고 시스템 폰트로 대체
     (San Francisco/Segoe UI가 유사한 그로테스크 성격), 한글 표시를 위해 맑은 고딕 등 추가.
     차트 색은 Notion 스티커 팔레트 원본 값을 dataviz 스킬 검증 스크립트로 통과시킨
     버전(채도 미세 보정) — 카테고리=차종 식별, 파랑 1색 램프=차수 순서, 역할색=구분. -->
<script src="chart.js"></script>
<style>
  :root{
    /* design/DESIGN-notion.md 토큰 이식 */
    --primary:        #0075de;
    --primary-active: #005bab;
    --canvas:         #f6f5f4;
    --surface:        #ffffff;
    --ink:            rgba(0,0,0,0.92);
    --ink-secondary:  #31302e;
    --ink-muted:      #615d59;
    --ink-faint:      #a39e98;
    --hairline:       #e6e6e6;
    --input-border:   #dddddd;

    /* Notion 스티커 팔레트를 CVD 안전성 검증 통과시킨 버전 (원본 대비 teal만 채도 미세 보정) */
    --sticker-blue:   #0075de; /* = primary, 카테고리 슬롯1 겸용 */
    --sticker-orange: #dd5b00;
    --sticker-teal:   #0e9c96;
    --sticker-pink:   #ff64c8;
    --sticker-green:  #1aae39;
    --sticker-purple: #7b5aa6;

    --role-verify: var(--sticker-blue);
    --role-env:    var(--sticker-purple);
    --role-pm:     var(--sticker-green);
    --role-normal: var(--sticker-blue);
    --role-issue:  var(--sticker-orange);

    --r-xs: 4px; --r-sm: 5px; --r-md: 8px; --r-lg: 12px; --r-full: 9999px;
    --sp-xxs:4px; --sp-xs:8px; --sp-sm:12px; --sp-md:16px; --sp-lg:24px; --sp-xl:28px; --sp-xxl:32px;

    /* NotionInter 대체 — 외부 폰트 미로드(사내망 CDN 차단 이력), 시스템 산세리프 + 한글 폴백 */
    --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.33;-webkit-font-smoothing:antialiased;}
  #app{max-width:900px;margin:0 auto;padding:44px 32px 60px;}

  /* 헤더 — heading-2 스케일(26px/700/-0.625px), 마케팅 히어로 대비 임베드 폭에 맞게 축소 */
  .head h1{font-size:26px;line-height:1.23;margin:0 0 4px;font-weight:700;letter-spacing:-0.625px;color:var(--ink);}
  .head .meta{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--ink-faint);margin-bottom:var(--sp-xxl);}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--sticker-green);flex-shrink:0;}
  .dot.syncing{animation:pulse 1.1s infinite;}
  @keyframes pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}

  /* badge-pill 컴포넌트 — 흰 배경, 파랑 텍스트, eyebrow 타이포, 완전 라운드 */
  .badge-pill{
    display:inline-flex;align-items:center;background:var(--surface);color:var(--primary);
    font-size:12px;font-weight:600;letter-spacing:0.125px;line-height:1.33;
    border-radius:var(--r-full);padding:4px 10px;border:1px solid var(--hairline);
  }
  .section{margin-top:var(--sp-xxl);}
  .section:first-of-type{margin-top:0;}
  .section-label{margin-bottom:var(--sp-sm);}

  /* text-input 컴포넌트 — 흰 배경, 1px #ddd 테두리, 4px 라운드 (알약형 금지) */
  .filters{display:flex;flex-wrap:wrap;gap:var(--sp-sm);margin-bottom:var(--sp-xxl);}
  .filters .field label{
    display:block;font-size:12px;color:var(--ink-faint);font-weight:600;letter-spacing:0.125px;margin-bottom:5px;
  }
  select{
    appearance:none;-webkit-appearance:none;
    padding:6px 26px 6px 8px;border:1px solid var(--input-border);border-radius:var(--r-xs);
    background:var(--surface);color:var(--ink);font-size:14px;font-family:var(--sans);
    cursor:pointer;transition:border-color .12s ease;min-width:120px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%23615d59' stroke-width='1.3' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center;
  }
  select:hover{border-color:var(--ink-faint);}
  select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,117,222,0.15);}

  /* feature-card 컴포넌트 — 흰 배경, 12px 라운드, 24px 패딩, 헤어라인만(그림자 없음) */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-sm);margin-bottom:var(--sp-xxl);}
  .stat-card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:var(--sp-lg);}
  .stat-card .stat-head{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
  .stat-card .dot{width:8px;height:8px;}
  .stat-label{font-size:12px;color:var(--ink-faint);font-weight:600;letter-spacing:0.125px;}
  .stat-value{font-variant-numeric:tabular-nums;font-size:26px;font-weight:700;letter-spacing:-0.625px;color:var(--ink);}
  .stat-value span{font-size:13px;color:var(--ink-muted);font-weight:500;margin-left:3px;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-sm);}
  .card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:var(--sp-lg);}
  .card h2{
    font-size:15px;line-height:1.3;margin:0 0 var(--sp-md);font-weight:700;letter-spacing:-0.15px;color:var(--ink);
    display:flex;align-items:center;gap:8px;
  }
  .card h2 .swatch{width:9px;height:9px;border-radius:var(--r-full);flex-shrink:0;}
  .card.wide{grid-column:1 / -1;}
  .chart-wrap{position:relative;height:220px;}
  canvas{max-width:100%;}
  .warn-note{display:none;color:var(--role-issue);font-size:13px;margin-bottom:var(--sp-sm);}
  @media (max-width:700px){ .grid{grid-template-columns:1fr;} .stats{grid-template-columns:1fr;} #app{padding:32px 18px 48px;} }
</style>
</head>
<body>
<div id="app">
  <div class="head">
    <h1>펌웨어 배포 검증 공수 대시보드</h1>
    <div class="meta"><span class="dot" id="syncDot"></span><span id="syncLabel">불러오는 중…</span><span>· 60초마다 자동 갱신 · 조회 전용</span></div>
  </div>

  <div class="filters">
    <div class="field"><label>담당자</label><select id="fMember"><option value="all">전체</option></select></div>
    <div class="field"><label>월</label><select id="fMonth"><option value="all">전체</option></select></div>
    <div class="field"><label>차종</label><select id="fVehicle"><option value="all">전체</option></select></div>
    <div class="field"><label>차수</label><select id="fRound"><option value="all">전체</option></select></div>
    <div class="field"><label>구분</label><select id="fGroup">
      <option value="all">전체</option>
      <option value="verify">검증 수행</option>
      <option value="env">환경 설정</option>
      <option value="pm">PM 업무</option>
    </select></div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-head"><span class="dot" style="background:var(--sticker-blue);"></span><span class="stat-label">총 공수</span></div><div class="stat-value" id="statTotal">0<span>시간</span></div></div>
    <div class="stat-card"><div class="stat-head"><span class="dot" style="background:var(--sticker-teal);"></span><span class="stat-label">총 기록 건수</span></div><div class="stat-value" id="statCount">0<span>건</span></div></div>
    <div class="stat-card"><div class="stat-head"><span class="dot" style="background:var(--sticker-purple);"></span><span class="stat-label">건당 평균</span></div><div class="stat-value" id="statAvg">0<span>분</span></div></div>
  </div>

  <p class="warn-note" id="chartLibWarning">※ 차트 라이브러리를 불러오지 못했습니다. 숫자 집계는 정상입니다.</p>

  <div class="section">
    <div class="section-label"><span class="badge-pill">담당자 · 차종</span></div>
    <div class="grid">
      <div class="card"><h2><span class="swatch" style="background:var(--sticker-blue);"></span>인당 총공수 (시간)</h2><div class="chart-wrap"><canvas id="chartByMember"></canvas></div></div>
      <div class="card"><h2><span class="swatch" style="background:var(--sticker-blue);"></span>차종별 총공수 — 차수별 구성 (시간)</h2><div class="chart-wrap"><canvas id="chartByVehicle"></canvas></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label"><span class="badge-pill">검증 항목</span></div>
    <div class="grid">
      <div class="card"><h2><span class="swatch" style="background:var(--sticker-teal);"></span>중분류(A-1~A-6)별 평균 (분)</h2><div class="chart-wrap"><canvas id="chartByMidVerify"></canvas></div></div>
      <div class="card"><h2><span class="swatch" style="background:var(--sticker-orange);"></span>정상 진행 vs 이슈 대응 (시간)</h2><div class="chart-wrap"><canvas id="chartNormalVsIssue"></canvas></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label"><span class="badge-pill">추이 · 상세</span></div>
    <div class="grid">
      <div class="card wide"><h2><span class="swatch" style="background:var(--sticker-purple);"></span>월별 추이 — 차종별 (시간)</h2><div class="chart-wrap"><canvas id="chartMonthly"></canvas></div></div>
      <div class="card wide"><h2><span class="swatch" style="background:var(--sticker-pink);"></span>소분류별 평균 소요시간 (분)</h2><div class="chart-wrap" id="subWrap" style="height:300px;"><canvas id="chartBySub"></canvas></div></div>
    </div>
  </div>
</div>

<script>
(function(){
  var API_URL = 'https://script.google.com/macros/s/AKfycbwiOgkGyZMNVIZ1LEVPxe6zfPf3QAOHSrLmK8uUYVjAAB4-UABfm5mnqQLkuydlTer8/exec';
  var VERIFY_MIDS = ['A-1','A-2','A-3','A-4','A-5','A-6'];
  var NORMAL_STAGES = ['검증 수행'];
  var ISSUE_STAGES = ['Fail 분석','이슈리포트 작성'];

  // design/DESIGN-notion.md의 스티커 팔레트를 dataviz 스킬 검증 스크립트로 통과시킨 버전
  // (원본 대비 teal만 #2a9d99→#0e9c96로 채도 미세 보정 — 색약 안전성 채도 하한 통과 목적)
  var CAT = ['#0075de','#dd5b00','#0e9c96','#ff64c8','#1aae39','#7b5aa6']; // blue,orange,teal,pink,green,purple
  // 차수 순차 램프 — 브랜드의 primary/primary-active/sky 토큰을 그대로 활용 (연→진)
  var ROUND_RAMP = ['#8fc3f2','#62aef0','#0075de','#0060b8','#005bab']; // 1~5차
  var ROLE = { verify:'#0075de', env:'#7b5aa6', pm:'#1aae39', normal:'#0075de', issue:'#dd5b00' };
  var INK_MUTED = '#615d59';
  var GRID = '#e6e6e6';
  var SURFACE = '#ffffff';

  var LOGS = [];
  var MEMBERS = [];
  var VEHICLES = [];
  var charts = {};

  async function sGet(key, fallback){
    try{
      var res = await fetch(API_URL + '?action=get&key=' + encodeURIComponent(key));
      var data = await res.json();
      if(!data || data.value === null || typeof data.value === 'undefined') return fallback;
      return JSON.parse(data.value);
    }catch(e){
      console.error('storage get failed', key, e);
      return fallback;
    }
  }
  function setSyncing(on){
    document.getElementById('syncDot').classList.toggle('syncing', on);
    document.getElementById('syncLabel').textContent = on ? '동기화 중' : '동기화됨';
  }
  function uniqueSorted(arr){
    var s = {}; arr.forEach(function(a){ if(a) s[a]=true; });
    return Object.keys(s).sort();
  }
  function fmtHours(min){ return (Math.round(min/6)/10).toString(); }
  function roundColor(roundNum){ return ROUND_RAMP[Math.min(Math.max((roundNum||1)-1,0), ROUND_RAMP.length-1)]; }

  function fillFilter(id, options){
    var sel = document.getElementById(id);
    var prev = sel.value;
    sel.innerHTML = '';
    ['all'].concat(options).forEach(function(o){
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = (o==='all'?'전체':o);
      sel.appendChild(opt);
    });
    sel.value = (prev && Array.prototype.some.call(sel.options, function(op){return op.value===prev;})) ? prev : 'all';
  }

  function refreshFilters(){
    fillFilter('fMember', MEMBERS.length ? MEMBERS : uniqueSorted(LOGS.map(function(l){return l.member;})));
    fillFilter('fMonth', uniqueSorted(LOGS.map(function(l){return l.month;})));
    fillFilter('fRound', uniqueSorted(LOGS.map(function(l){return (l.round||1)+'차';})));
    fillFilter('fVehicle', VEHICLES.length ? VEHICLES : uniqueSorted(LOGS.map(function(l){return l.vehicle;})));
    // fGroup은 고정 옵션이라 재구성하지 않음
  }

  function filteredLogs(){
    var member = document.getElementById('fMember').value;
    var month = document.getElementById('fMonth').value;
    var round = document.getElementById('fRound').value;
    var vehicle = document.getElementById('fVehicle').value;
    var group = document.getElementById('fGroup').value;
    return LOGS.filter(function(l){
      if(member!=='all' && l.member!==member) return false;
      if(month!=='all' && l.month!==month) return false;
      if(round!=='all' && ((l.round||1)+'차')!==round) return false;
      if(vehicle!=='all' && l.vehicle!==vehicle) return false;
      if(group!=='all' && l.group!==group) return false;
      return true;
    });
  }

  function destroyChart(key){
    if(charts[key]){ charts[key].destroy(); delete charts[key]; }
  }
  function baseChartOptions(extra){
    var opt = {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ font:{ family:'inherit', size:12 }, color:INK_MUTED, boxWidth:9, boxHeight:9, usePointStyle:true, pointStyle:'circle' } } },
      scales:{
        x:{ ticks:{ color:INK_MUTED, font:{size:11.5} }, grid:{ display:false }, border:{ color:GRID } },
        y:{ ticks:{ color:INK_MUTED, font:{size:11.5} }, grid:{ color:GRID }, border:{ display:false } }
      }
    };
    return Object.assign(opt, extra||{});
  }
  // Notion의 "색면 블록" 마크: 얇은 라운드(4~5px)의 단색 채움, 테두리 없음 — 파스텔/외곽선 대신 확신에 찬 솔리드 컬러
  function barSpec(extra){
    return Object.assign({ borderRadius:5, borderSkipped:false, barPercentage:0.55, categoryPercentage:0.7, borderWidth:0 }, extra||{});
  }

  function render(){
    var rows = filteredLogs();

    var totalMin = rows.reduce(function(s,l){return s+l.minutes;},0);
    document.getElementById('statTotal').innerHTML = fmtHours(totalMin)+'<span>시간</span>';
    document.getElementById('statCount').innerHTML = rows.length+'<span>건</span>';
    document.getElementById('statAvg').innerHTML = (rows.length? Math.round(totalMin/rows.length):0)+'<span>분</span>';

    if(typeof Chart === 'undefined'){
      document.getElementById('chartLibWarning').style.display='block';
      return;
    }

    var members = MEMBERS.length ? MEMBERS : uniqueSorted(LOGS.map(function(l){return l.member;}));
    var vehicles = VEHICLES.length ? VEHICLES : uniqueSorted(LOGS.map(function(l){return l.vehicle;}));

    // 인당 총공수 — 단일 계열, 브랜드 프라이머리 블루 솔리드
    var byMember = {};
    members.forEach(function(m){ byMember[m]=0; });
    rows.forEach(function(l){ byMember[l.member]=(byMember[l.member]||0)+l.minutes; });
    destroyChart('member');
    charts.member = new Chart(document.getElementById('chartByMember'), {
      type:'bar',
      data:{ labels:Object.keys(byMember), datasets:[barSpec({ label:'시간', data:Object.values(byMember).map(function(m){return Math.round(m/6)/10;}), backgroundColor:CAT[0] })] },
      options: baseChartOptions({ plugins:{ legend:{display:false} } })
    });

    // 차종별 총공수 — 차종=x축(항목), 차수=파랑 순차 램프로 누적. 세그먼트 사이 2px 서피스 갭
    var roundNums = uniqueSorted(rows.map(function(l){return String(l.round||1);})).map(Number).sort(function(a,b){return a-b;});
    if(!roundNums.length) roundNums = [1];
    var vehicleDatasets = roundNums.map(function(rn){
      return barSpec({
        label: rn+'차',
        data: vehicles.map(function(v){
          return Math.round(rows.filter(function(l){return l.vehicle===v && (l.round||1)===rn;})
            .reduce(function(s,l){return s+l.minutes;},0)/6)/10;
        }),
        backgroundColor: roundColor(rn),
        borderColor: SURFACE,
        borderWidth: 2
      });
    });
    destroyChart('vehicle');
    charts.vehicle = new Chart(document.getElementById('chartByVehicle'), {
      type:'bar',
      data:{ labels:vehicles, datasets:vehicleDatasets },
      options: baseChartOptions({
        plugins:{ legend:{ position:'bottom', labels:{ font:{size:11.5}, color:INK_MUTED, boxWidth:9, boxHeight:9, usePointStyle:true, pointStyle:'circle' } } },
        scales:{ x:{ stacked:true, ticks:{color:INK_MUTED,font:{size:11.5}}, grid:{display:false}, border:{color:GRID} },
                 y:{ stacked:true, ticks:{color:INK_MUTED,font:{size:11.5}}, grid:{color:GRID}, border:{display:false} } }
      })
    });

    // 중분류(A-1~A-6)별 평균 (verify only) — 단일 계열
    var midMap = {};
    VERIFY_MIDS.forEach(function(mv){ midMap[mv]={sum:0,count:0}; });
    rows.filter(function(l){return l.group==='verify';}).forEach(function(l){
      if(!midMap[l.mid]) return;
      midMap[l.mid].sum += l.minutes; midMap[l.mid].count += 1;
    });
    destroyChart('midVerify');
    charts.midVerify = new Chart(document.getElementById('chartByMidVerify'), {
      type:'bar',
      data:{ labels:VERIFY_MIDS, datasets:[barSpec({ label:'평균 분', data:VERIFY_MIDS.map(function(mv){ var x=midMap[mv]; return x.count? Math.round(x.sum/x.count):0; }), backgroundColor:CAT[2] })] },
      options: baseChartOptions({ plugins:{legend:{display:false}} })
    });

    // 정상 vs 이슈대응 — 역할 고정색 (파랑=정상, 주황=이슈)
    var normalSum=0, issueSum=0;
    rows.filter(function(l){return l.group==='verify';}).forEach(function(l){
      if(NORMAL_STAGES.indexOf(l.stage)>-1) normalSum += l.minutes;
      else if(ISSUE_STAGES.indexOf(l.stage)>-1) issueSum += l.minutes;
    });
    destroyChart('normalIssue');
    charts.normalIssue = new Chart(document.getElementById('chartNormalVsIssue'), {
      type:'bar',
      data:{ labels:['정상 진행 (검증 수행)','이슈 대응 (Fail분석·이슈리포트)'],
        datasets:[barSpec({ data:[Math.round(normalSum/6)/10, Math.round(issueSum/6)/10], backgroundColor:[ROLE.normal, ROLE.issue] })] },
      options: baseChartOptions({ plugins:{legend:{display:false}} })
    });

    // 월별 추이 — 차종=항목 고정색(카테고리 팔레트 순서 고정)
    var months = uniqueSorted(rows.map(function(l){return l.month;}));
    var monthlyByVehicle = {};
    vehicles.forEach(function(v){ monthlyByVehicle[v] = months.map(function(){return 0;}); });
    rows.forEach(function(l){
      var idx = months.indexOf(l.month);
      if(idx>-1 && monthlyByVehicle[l.vehicle]) monthlyByVehicle[l.vehicle][idx] += l.minutes;
    });
    destroyChart('monthly');
    charts.monthly = new Chart(document.getElementById('chartMonthly'), {
      type:'line',
      data:{ labels:months, datasets: vehicles.map(function(v,i){
        var c = CAT[i%CAT.length];
        return { label:v, data:monthlyByVehicle[v].map(function(m){return Math.round(m/6)/10;}), borderColor:c, backgroundColor:c, borderWidth:2, pointRadius:3, pointHoverRadius:5, tension:0.25, fill:false };
      })},
      options: baseChartOptions({})
    });

    // 소분류별 평균 — 단일 계열
    var subMap = {};
    rows.forEach(function(l){
      var key = l.mid+' · '+l.sub;
      if(!subMap[key]) subMap[key]={sum:0,count:0};
      subMap[key].sum += l.minutes; subMap[key].count += 1;
    });
    var subLabels = Object.keys(subMap);
    var subAvgs = subLabels.map(function(k){ return Math.round(subMap[k].sum/subMap[k].count); });
    document.getElementById('subWrap').style.height = Math.max(220, subLabels.length*18+40) + 'px';
    destroyChart('sub');
    charts.sub = new Chart(document.getElementById('chartBySub'), {
      type:'bar',
      data:{ labels:subLabels, datasets:[barSpec({ label:'평균 분', data:subAvgs, backgroundColor:CAT[3] })] },
      options: baseChartOptions({ indexAxis:'y', plugins:{legend:{display:false}} })
    });
  }

  async function load(){
    setSyncing(true);
    var [m, v, l] = await Promise.all([
      sGet('meta-members', []),
      sGet('meta-vehicles', []),
      sGet('work-logs', [])
    ]);
    MEMBERS = m || [];
    VEHICLES = v || [];
    LOGS = l || [];
    setSyncing(false);
    refreshFilters();
    render();
  }

  document.addEventListener('DOMContentLoaded', function(){
    ['fMember','fMonth','fRound','fVehicle','fGroup'].forEach(function(id){
      document.getElementById(id).addEventListener('change', render);
    });
    load();
    setInterval(load, 60000); // 60초마다 자동 갱신 (조회 전용이라 부담 없음)
  });
})();
</script>
</body>
</html>
